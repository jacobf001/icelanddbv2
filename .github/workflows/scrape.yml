name: Scrape KSI Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      from_year:
        description: 'From year (default: current year)'
        required: false
        default: '2026'
      limit:
        description: 'Max matches per script (0 = unlimited)'
        required: false
        default: '200'
      discover:
        description: 'Run discover competitions + matches? (yes/no)'
        required: false
        default: 'no'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 1. Discover competitions
        if: github.event.inputs.discover == 'yes'
        run: cd scripts && npx tsx 1.discover-competitions.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 2. Discover matches
        if: github.event.inputs.discover == 'yes'
        run: cd scripts && npx tsx 2.discover-matches.ts --from ${{ github.event.inputs.from_year || '2026' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 3. Scrape match overviews
        run: cd scripts && npx tsx 3.scrape-match-overview.ts --from ${{ github.event.inputs.from_year || '2026' }} --limit ${{ github.event.inputs.limit || '200' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 4. Scrape lineups
        run: cd scripts && npx tsx 4.scrape-match-lineups.ts --from ${{ github.event.inputs.from_year || '2026' }} --limit ${{ github.event.inputs.limit || '200' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 5. Scrape events
        run: cd scripts && npx tsx 5.scrape-events-overview.ts --from ${{ github.event.inputs.from_year || '2026' }} --limit ${{ github.event.inputs.limit || '200' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 6. Scrape player birth years
        run: cd scripts && npx tsx 6.scrape-player-birth-years.ts --limit ${{ github.event.inputs.limit || '200' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}