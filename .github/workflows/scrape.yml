name: Scrape KSI Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run pipeline
        run: |
          cd scripts
          node --import tsx/esm "1.discover-competitions.ts"
          node --import tsx/esm "2.discover-matches.ts"
          node --import tsx/esm "3.scrape-match-overview.ts"
          node --import tsx/esm "4.scrape-match-lineups.ts"
          node --import tsx/esm "5.scrape-events-overview.ts"
          node --import tsx/esm "6.scrape-player-birth-years.ts"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}